name: Deploy demo to GitHub Pages

on:
  # Production deploy on published releases.
  release:
    types: [published]
  # Kept intentionally for bootstrap, retries, and backfills.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify GitHub Pages is enabled for this repository
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          pages_status="$(curl -sS -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pages")"

          if [ "${pages_status}" != "200" ]; then
            echo "::error title=GitHub Pages is not enabled::Enable Pages in Settings > Pages and set Source to GitHub Actions, then rerun this workflow."
            exit 1
          fi

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Build with mock data enabled
        run: npm run build -- --base /public-transit-viewer/

      - name: Write runtime env.js for mock mode
        run: |
          cat > dist/env.js << 'EOF'
          window.__ENV__ = {
            VITE_ENABLE_MOCK_DATA: "true",
            VITE_DISABLE_BENCHMARK: "true"
          };
          EOF

      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
