name: Docker CI

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint, typecheck, format, unit tests
        run: npm run check

  docker-build:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t naviqore-viewer .
