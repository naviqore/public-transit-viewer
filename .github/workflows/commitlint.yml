name: Commitlint

on:
  pull_request:
    branches: ['main']

jobs:
  lint-commits:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Lint Commits
        uses: wagoid/commitlint-github-action@v6
        with:
          configFile: commitlint.config.cjs
