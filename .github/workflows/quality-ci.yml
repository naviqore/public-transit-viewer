name: Quality CI

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Lint, Typecheck, Format, Unit Tests
        run: npm run check

      - name: Production Build
        run: npm run build

      - name: Coverage
        run: npm run test:coverage
