# Run nginx worker processes without root privileges.
# The master process is started as the USER declared in the Dockerfile (appuser),
# so the 'user' directive must be omitted to avoid a permission error.

worker_processes auto;

# Writable locations for non-root user
pid        /tmp/nginx.pid;
error_log  /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    # Temp-path overrides so nginx can write without root
    client_body_temp_path /tmp/client_body;
    proxy_temp_path       /tmp/proxy_temp;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile           on;
    keepalive_timeout  65;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_comp_level   6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/xml
        application/json
        image/svg+xml;

    server {
        # Port 8080 does not require root to bind
        listen       8080;
        server_name  _;

        root   /usr/share/nginx/html;
        index  index.html;

        # ── SPA routing ───────────────────────────────────────────────────────
        # Unknown paths fall back to index.html so React Router handles them.
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ── Hashed assets: cache permanently ─────────────────────────────────
        # Vite generates content-addressed filenames under /assets/, so they
        # are safe to cache forever.
        location /assets/ {
            add_header Cache-Control "max-age=31536000, immutable";
        }

        # ── index.html: never cache ───────────────────────────────────────────
        # The entry point must always be fetched fresh so the browser picks up
        # new asset filenames after a deployment.
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma        "no-cache";
            add_header Expires       "0";
        }
    }
}
